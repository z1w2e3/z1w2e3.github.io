<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF.js Viewer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        #pdf-viewer {
            position: relative;
            width: 100%;
            height: 100vh; /* Adjust the height as needed */
            overflow: auto; /* Add scrolling if the pages don't fit the screen */
        }
        canvas {
            display: block; /* Removes bottom gap */
        }
        .page {
            margin: 10px auto;
            page-break-after: always;
            width: 100%;
            max-width: 800px; /* Adjust the max-width as needed */
        }
    </style>
</head>
<body>

<div id="pdf-viewer"></div>

<!-- PDF.js library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script> 
<!-- PDF.js worker -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.worker.min.js"></script> 

<script>
    // Specify the path to the PDF file
    var pdfUrl = '锡元素我为元素代言(2).pdf'; // Replace this with your actual PDF file URL

    // Set the worker src for the worker option
    pdfjsLib
.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.worker.min.js';

    // Asynchronous download of the PDF
    pdfjsLib
.getDocument(pdfUrl).promise.then(function(pdfDoc_) {
        console.log("PDF loaded");

        // Get the total number of pages in the PDF
        pdfDoc_
.numPages.then(function(numPages) {
            console.log("Total Pages: " + numPages);

            // Render all pages
            for (var pageNum = 1; pageNum <= numPages; pageNum++) {
                pdfDoc_
.getPage(pageNum).then(function(page) {
                    var scale = 1; // Adjust the scale to fit the screen
                    var viewport = page.getViewport({ scale: scale });

                    // Prepare canvas using PDF page dimensions
                    var canvas = document.createElement('canvas');
                    var context = canvas.getContext('2d');
                    canvas
.height = viewport.height;
                    canvas
.width = viewport.width;

                    // Create a container for each page
                    var pageDiv = document.createElement('div');
                    pageDiv
.className = 'page';
                    pageDiv
.appendChild(canvas);
                    document.getElementById('pdf-viewer').appendChild(pageDiv);

                    // Render PDF page into canvas context
                    var renderContext = {
                        canvasContext: context,
                        viewport:
 viewport
                    };
                    page
.render(renderContext);
                });
            }
        });
    }).catch(function(reason) {
        console.error('Error: ' + reason);
    });
</script>

</body>
    <br>
    <a href="./index.html">返回主页面</a>

</html>
